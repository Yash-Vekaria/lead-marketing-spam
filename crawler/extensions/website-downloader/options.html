<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Options</title>
    <style>
        /* Basic reset and font styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }

        .options-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .option-label {
            font-size: 18px;
            margin-bottom: 15px;
            display: block;
        }

        .option-checkbox {
            transform: scale(1.5);
            margin-right: 10px;
        }

        .description {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .status-indicator {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-enabled {
            color: #4CAF50;
        }

        .status-disabled {
            color: #f44336;
        }
    </style>
  <script type="module" crossorigin src="/chunks/options-BNpdJQ6K.js"></script>
  <link rel="modulepreload" crossorigin href="/chunks/_virtual_wxt-html-plugins-DHuczpQ9.js">
</head>
<body>

<div class="options-container">
    <h1>Website Downloader Options</h1>
    <label class="option-label">
        <input type="checkbox" id="checkboxOption" class="option-checkbox">
        Enable on-page download button
    </label>
    <p class="description">
        If this option is enabled, a download button will be available on each page, allowing you to download content without cluttering your extensions bar.
    </p>
    <p id="statusIndicator" class="status-indicator"></p>
</div>

</body>
</html>
